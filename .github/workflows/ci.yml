name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

      - name: Analyze code
        run: flutter analyze

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "No coverage file found"
            exit 1
          fi

          TOTAL_LINES=$(grep -c "^DA:" coverage/lcov.info || echo "0")
          HIT_LINES=$(grep "^DA:" coverage/lcov.info | grep -cv ",0$" || echo "0")

          if [ "$TOTAL_LINES" -eq 0 ]; then
            echo "No lines found in coverage report"
            exit 1
          fi

          COVERAGE=$((HIT_LINES * 100 / TOTAL_LINES))
          echo "Coverage: $COVERAGE% ($HIT_LINES/$TOTAL_LINES lines)"

          THRESHOLD=50
          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "Coverage $COVERAGE% is below threshold $THRESHOLD%"
            exit 1
          fi

          echo "Coverage $COVERAGE% meets threshold $THRESHOLD%"

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

